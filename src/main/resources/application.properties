# =====================================================
# Server
# =====================================================

server.port=8080

# =====================================================
# MSSQL Datasource (Windows Authentication)
# =====================================================

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TESTDB;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=appuser
spring.datasource.password=admin

# =====================================================
# JPA / Hibernate
# =====================================================

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# Connection Pool (HikariCP - default in Spring Boot)
# =====================================================

spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# Logging (Trace ID compatible)
# =====================================================

logging.level.root=INFO
logging.level.com.example.gtdcards=INFO

logging.file.name=logs/gtd-cards-app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId}] %logger{36} - %msg%n

# =====================================================
# Swagger / OpenAPI (Springdoc)
# =====================================================

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
